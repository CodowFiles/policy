<p class="doc-para align-center" style="font-size: 20px; font-family: SimHei, 'Microsoft YaHei', sans-serif; margin: 20px 0; text-align: center;"><strong>2026年可多新开带铺加盟方案3.0</strong></p>
<p class="empty-para">&nbsp;</p>
<p class="doc-para align-justify text-indent">为提升客户满意度，公司对新开带铺加盟门店<span style="color: #FF0000">设定以下政策</span>：</p>
<p class="doc-para text-indent">1、新客户带铺加盟新开可多，公司招牌全送（根据门店实际情况提交处理方案，经公司总经办审批同意方可执行，总金额在15000元以内）。</p>
<p class="doc-para text-indent">2、老客户带铺加盟新开可多，公司赠送5000元积分，且只可与复数店优惠同享。</p>
<p class="doc-para text-indent"><span style="color: #000000">备注：带铺加盟包含自购铺，</span><span style="color: #FF0000">不包含招投标成功开店项</span><span style="color: #FF0000">目</span><span style="color: #000000">。</span></p>
<p class="empty-para">&nbsp;</p>
<p class="doc-para text-indent"><span style="color: #000000">以上方案从</span><span style="color: #FF0000">2026年01月01日</span><span style="color: #000000">开始执行，试行3个月，如无调整则继续沿用。</span></p>
