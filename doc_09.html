<style>

:root{--primary:#1a5fa8;--pl:#e8f0fb;--text:#222;--tl:#666;--border:#ddd;--bg:#f5f7fa;--white:#fff;--shadow:0 2px 8px rgba(0,0,0,.10);--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.7;}
.top-bar{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:0 10px;height:48px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.menu-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.top-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.search-wrap{display:flex;align-items:center;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 8px;flex-shrink:0;}
#searchInput{background:none;border:none;outline:none;color:#fff;font-size:13px;width:80px;}
#searchInput::placeholder{color:rgba(255,255,255,.7);}
.search-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:15px;}
/* ===== 检索结果面板 ===== */
.sr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;overscroll-behavior:contain;}
.sr-overlay.on{display:flex;flex-direction:column;}
.sr-panel{background:#fff;width:100%;max-width:560px;margin:auto;border-radius:12px 12px 0 0;position:absolute;bottom:0;left:0;right:0;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.18);}
.sr-panel-head{background:var(--primary);color:#fff;padding:12px 14px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sr-panel-head .sr-kw{font-weight:700;flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-panel-head .sr-total{font-size:12px;opacity:.85;white-space:nowrap;}
.sr-close-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;}
.sr-list{overflow-y:auto;flex:1;padding:8px 0;}
.sr-doc-card{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s;}
.sr-doc-card:active{background:#f0f7ff;}
.sr-doc-card:last-child{border-bottom:none;}
.sr-doc-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.sr-doc-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sr-doc-snippet{font-size:11px;color:#555;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-doc-snippet mark{background:#ffe066;color:#333;font-style:normal;}
.sr-empty{text-align:center;padding:32px 16px;color:#999;font-size:13px;}
/* 行内检索导航条（跳转后显示） */
.srbar{display:none;background:#1a5fa8;padding:5px 10px;font-size:12px;color:#fff;position:sticky;top:48px;z-index:90;align-items:center;gap:6px;}
.srbar.on{display:flex;}
.srbar .sr-label{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srbar button{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:4px;padding:3px 9px;cursor:pointer;font-size:13px;}
.srbar .clr{background:rgba(255,255,255,.1);}
.srbar .reopen-btn{background:rgba(255,255,255,.15);font-size:11px;padding:3px 8px;}
.highlight{background:#ffe066;color:#111;border-radius:2px;}
.highlight.current{background:#ff9900;outline:2px solid #ff6600;border-radius:2px;}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.nav-overlay.open{display:block;}
.side-nav{position:fixed;top:0;left:0;width:280px;max-width:85vw;height:100%;background:var(--white);z-index:201;overflow-y:auto;transform:translateX(-100%);transition:transform .3s;box-shadow:2px 0 12px rgba(0,0,0,.15);}
.side-nav.open{transform:translateX(0);}
.nav-header{background:var(--primary);color:#fff;padding:14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
.nav-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
.side-nav ul{list-style:none;padding:4px 0;}
.side-nav li a{display:block;padding:8px 14px;color:var(--text);text-decoration:none;font-size:12px;border-bottom:1px solid #f0f0f0;line-height:1.4;}
.layout{display:block;}
.main-content{padding:10px 8px 40px;}
.policy-section{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.section-header{padding:10px 12px 8px;border-bottom:2px solid var(--pl);background:linear-gradient(135deg,var(--pl) 0%,#fff 100%);}
.section-title{font-size:14px;font-weight:700;color:var(--primary);line-height:1.4;margin-bottom:4px;}
.section-tags{margin-bottom:3px;}
.section-meta{font-size:10px;color:var(--tl);word-break:break-all;}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-right:3px;}
.tag-both{background:#d4edda;color:#155724;}
.tag-pdf{background:#fff3cd;color:#856404;}
.tag-word{background:#cce5ff;color:#004085;}
.section-tabs{display:flex;background:#f8f9fa;border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:7px 4px;background:none;border:none;font-size:12px;color:var(--tl);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;background:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.word-content{padding:10px 8px;font-size:12px;line-height:1.65;overflow-x:hidden;}
.word-content h1{font-size:15px;font-weight:700;color:var(--primary);text-align:center;margin:8px 0 12px;padding-bottom:5px;border-bottom:2px solid var(--pl);}
.word-content h2{font-size:14px;font-weight:700;color:var(--primary);margin:12px 0 6px;padding-left:7px;border-left:3px solid var(--primary);}
.word-content h3{font-size:13px;font-weight:600;color:#1e3a5f;margin:10px 0 5px;}
.word-content h4,.word-content h5{font-size:12px;font-weight:600;color:#2c5282;margin:8px 0 3px;}
.word-content p,.word-content .body-text,.word-content .list-para{margin:2px 0;}
.word-content span[style*="font-size"]{font-size:12px!important;}
.word-content span[style*="font-size:20pt"],.word-content span[style*="font-size:18pt"],.word-content span[style*="font-size:16pt"],.word-content span[style*="font-size:14pt"]{font-size:14px!important;}
.table-wrap{margin:6px 0;overflow-x:auto;}
.doc-table{width:100%;border-collapse:collapse;font-size:11px;}
.doc-table th,.doc-table td{border:1px solid #ccc;padding:4px 5px;text-align:left;vertical-align:top;word-break:break-all;overflow-wrap:anywhere;}
.doc-table th{background:var(--pl);font-weight:600;color:var(--primary);}
.doc-table tr:nth-child(even) td{background:#fafafa;}
.doc-table colgroup col{min-width:0!important;width:auto!important;}
.doc-img{text-align:center;margin:8px 0;}
.doc-img img{max-width:100%;height:auto;border:1px solid #eee;border-radius:3px;}
.img-err{color:#dc3545;font-size:12px;}
.scan-content{padding:4px;}
.scan-page{margin-bottom:6px;text-align:center;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.scan-page img{width:100%;height:auto;display:block;}
.page-num{font-size:10px;color:#888;padding:2px;background:#ebebeb;}
.back-top{position:fixed;right:14px;bottom:20px;width:36px;height:36px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:var(--shadow);display:none;align-items:center;justify-content:center;z-index:50;}
.back-top.on{display:flex;}
@media(min-width:700px){
  body{font-size:15px;}
  .side-nav{position:sticky;top:48px;height:calc(100vh - 48px);transform:none!important;box-shadow:var(--shadow);}
  .nav-overlay{display:none!important;}
  .layout{display:flex;max-width:1200px;margin:0 auto;}
  .side-nav{width:250px;flex-shrink:0;overflow-y:auto;}
  .main-content{flex:1;padding:14px 16px 40px;}
  .menu-btn{display:none;}
  .word-content{font-size:13px;padding:14px 16px;}
  .word-content span[style*="font-size"]{font-size:unset!important;}
  .word-content span[style*="font-size:20pt"],.word-content span[style*="font-size:18pt"]{font-size:18px!important;}
  .word-content span[style*="font-size:16pt"],.word-content span[style*="font-size:14pt"]{font-size:15px!important;}
  .word-content span[style*="font-size:13pt"],.word-content span[style*="font-size:12pt"],.word-content span[style*="font-size:11pt"]{font-size:13px!important;}
  .doc-table{font-size:12px;}
  .doc-table th,.doc-table td{padding:6px 8px;word-break:normal;overflow-wrap:break-word;}
  .section-title{font-size:15px;}
  #searchInput{width:120px;}
  .top-title{font-size:15px;}
}

/* 文档页额外样式 */

<button id="backTop2" class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8679;</button>
<script>
// 行内搜索（从首页跳转携带关键词）
var _m2=[],_i2=-1;
function hlSearch2(kw){
  if(!kw)return;
  var regs=kw.split(/[\s,，]+/).filter(Boolean).map(function(t){
    return new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  });
  var walker=document.createTreeWalker(document.querySelector('.doc-wrap'),NodeFilter.SHOW_TEXT);
  var nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);
  _m2=[];
  nodes.forEach(function(node){
    var v=node.nodeValue;
    var hit=regs.some(function(re){re.lastIndex=0;return re.test(v);});
    if(!hit)return;
    var frag=document.createDocumentFragment(),last=0;
    var matches=[];
    regs.forEach(function(re){re.lastIndex=0;var m;while((m=re.exec(v))!==null)matches.push({s:m.index,e:m.index+m[0].length});});
    matches.sort(function(a,b){return a.s-b.s;});
    var merged=[];
    matches.forEach(function(m){
      if(!merged.length){merged.push(m);return;}
      var l=merged[merged.length-1];
      if(m.s<l.e)l.e=Math.max(l.e,m.e);else merged.push(m);
    });
    merged.forEach(function(seg){
      if(seg.s>last)frag.appendChild(document.createTextNode(v.slice(last,seg.s)));
      var sp=document.createElement('span');sp.className='doc-highlight';sp.textContent=v.slice(seg.s,seg.e);
      frag.appendChild(sp);_m2.push(sp);last=seg.e;
    });
    if(last<v.length)frag.appendChild(document.createTextNode(v.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
  if(_m2.length>0){
    _i2=0;scrollTo2(0);
    document.getElementById('srbar2').classList.add('on');
  }
}
function scrollTo2(i){
  _m2.forEach(function(el){el.classList.remove('current');});
  _m2[i].classList.add('current');
  _m2[i].scrollIntoView({behavior:'smooth',block:'center'});
  // 激活所在Tab
  var tc=_m2[i].closest('.tab-content');
  if(tc&&!tc.classList.contains('active')){
    var sec=tc.closest('.policy-section');
    var btn=sec&&sec.querySelector('[onclick*="'+tc.id+'"]');
    if(btn)switchTab(btn,tc.id);
  }
  document.getElementById('srtext2').textContent='"'+_kw2+'" '+(_i2+1)+'/'+_m2.length;
}
var _kw2='';
function goPrev2(){if(!_m2.length)return;_i2=(_i2-1+_m2.length)%_m2.length;scrollTo2(_i2);}
function goNext2(){if(!_m2.length)return;_i2=(_i2+1)%_m2.length;scrollTo2(_i2);}
function clearSearch2(){
  document.querySelectorAll('.doc-highlight').forEach(function(sp){
    var p=sp.parentNode;if(!p)return;p.replaceChild(document.createTextNode(sp.textContent),sp);p.normalize();
  });
  _m2=[];_i2=-1;document.getElementById('srbar2').classList.remove('on');
}
function switchTab(btn,cid){
  var sec=btn.closest('.policy-section');
  sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(cid).classList.add('active');
}
// 从URL读关键词
(function(){
  var p=new URLSearchParams(window.location.search);
  _kw2=p.get('q')||'';
  if(_kw2)setTimeout(function(){hlSearch2(_kw2);},300);
})();
// 懒加载
if('IntersectionObserver' in window){
  var _io=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){var img=x.target;if(img.dataset.src){img.src=img.dataset.src;_io.unobserve(img);}}})},{rootMargin:'300px'});
  document.querySelectorAll('img[loading="lazy"]').forEach(function(img){_io.observe(img);});
}
// 回到顶部
window.addEventListener('scroll',function(){document.getElementById('backTop2').classList.toggle('on',window.scrollY>300);});
// 手机端默认扫描版Tab
(function(){
  if(window.innerWidth>=700)return;
  document.querySelectorAll('.policy-section').forEach(function(sec){
    var scanTab=sec.querySelector('.tab-btn[onclick*="-scan"]');
    if(!scanTab)return;
    sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    scanTab.classList.add('active');
    var m=scanTab.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);
    if(m)document.getElementById(m[1]).classList.add('active');
  });
})();
</script>
