<button id="backTop" class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8679;</button>
<script>
/* === 图片懒加载 === */
function loadImgs(container){
  var imgs=container.querySelectorAll('img[data-src]');
  if(!imgs.length)return;
  var idx=0;
  function loadNext(){
    if(idx>=imgs.length)return;
    var img=imgs[idx++];
    img.classList.add('img-skel');
    img.onload=function(){img.classList.remove('img-skel');};
    img.onerror=function(){img.classList.remove('img-skel');};
    img.src=img.getAttribute('data-src');
    img.removeAttribute('data-src');
    if(idx<imgs.length){
      if(window.requestIdleCallback)requestIdleCallback(loadNext,{timeout:300});
      else setTimeout(loadNext,60);
    }
  }
  loadNext();
}
/* === Tab切换 === */
function switchTab(btn,cid){
  var sec=btn.closest('.policy-section');
  sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  var tc=document.getElementById(cid);
  if(tc){tc.classList.add('active');loadImgs(tc);}
}
/* === 单文档内检索 === */
var _kw='',_hlEls=[],_hlIdx=-1;
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clearHL(){
  _hlEls.forEach(function(el){
    var p=el.parentNode;if(!p)return;
    p.replaceChild(document.createTextNode(el.textContent),el);
    p.normalize();
  });
  _hlEls=[];_hlIdx=-1;
  document.getElementById('srbar').classList.remove('on');
  document.getElementById('srtext').textContent='';
}
function highlightAll(node,re,arr){
  if(node.nodeType===3){
    var t=node.textContent;var m;re.lastIndex=0;
    var parts=[];var last=0;var found=false;
    while((m=re.exec(t))!==null){
      if(m.index>last)parts.push(document.createTextNode(t.slice(last,m.index)));
      var sp=document.createElement('span');sp.className='highlight';
      sp.textContent=m[0];arr.push(sp);parts.push(sp);found=true;
      last=m.index+m[0].length;
    }
    if(found){
      if(last<t.length)parts.push(document.createTextNode(t.slice(last)));
      var frag=document.createDocumentFragment();
      parts.forEach(function(p){frag.appendChild(p);});
      node.parentNode.replaceChild(frag,node);
    }
  } else if(node.nodeType===1&&!/^(script|style|textarea)$/i.test(node.tagName)){
    Array.from(node.childNodes).forEach(function(c){highlightAll(c,re,arr);});
  }
}
function doSearch(){
  var kw=document.getElementById('searchInput').value.trim();
  if(!kw)return;
  clearHL();
  _kw=kw;
  var re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  var wordContent=document.querySelector('.tab-content.active .word-content')||document.querySelector('.word-content');
  if(wordContent)highlightAll(wordContent,re,_hlEls);
  if(!_hlEls.length){
    alert('未找到"'+kw+'"');return;
  }
  _hlIdx=0;
  showHL();
  document.getElementById('srbar').classList.add('on');
  document.getElementById('srtext').textContent='共'+_hlEls.length+'处 关键词: '+kw;
}
function showHL(){
  _hlEls.forEach(function(el){el.classList.remove('current');});
  if(_hlIdx>=0&&_hlIdx<_hlEls.length){
    _hlEls[_hlIdx].classList.add('current');
    _hlEls[_hlIdx].scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function goPrev(){if(_hlEls.length){_hlIdx=(_hlIdx-1+_hlEls.length)%_hlEls.length;showHL();}}
function goNext(){if(_hlEls.length){_hlIdx=(_hlIdx+1)%_hlEls.length;showHL();}}
function clearSearch(){
  clearHL();
  document.getElementById('searchInput').value='';
}
/* === 回到顶部 === */
window.addEventListener('scroll',function(){
  document.getElementById('backTop').classList.toggle('on',window.scrollY>300);
});
/* === URL参数自动检索 === */
window.addEventListener('DOMContentLoaded',function(){
  // 默认激活扫描版
  var scanTab=document.querySelector('.tab-btn[onclick*="-scan"]');
  if(scanTab){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    scanTab.classList.add('active');
    var m=scanTab.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);
    if(m){var tc=document.getElementById(m[1]);if(tc){tc.classList.add('active');loadImgs(tc);}}
  } else {
    // 只有文字版时激活文字版
    var wordTab=document.querySelector('.tab-btn[onclick*="-word"]');
    if(wordTab){wordTab.classList.add('active');var m2=wordTab.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);if(m2){var tc2=document.getElementById(m2[1]);if(tc2)tc2.classList.add('active');}}
  }
  // 处理URL中的 ?q= 参数（从index页面跳转过来）
  var params=new URLSearchParams(window.location.search);
  var q=params.get('q');
  if(q){
    document.getElementById('searchInput').value=q;
    setTimeout(function(){
      // 先切到文字版做高亮
      var wordTab2=document.querySelector('.tab-btn[onclick*="-word"]');
      if(wordTab2){
        document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
        wordTab2.classList.add('active');
        var m3=wordTab2.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);
        if(m3){var tc3=document.getElementById(m3[1]);if(tc3)tc3.classList.add('active');}
      }
      doSearch();
    },300);
  }
});
/* 搜索框回车 */
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch();}});
document.getElementById('searchInput').addEventListener('input',function(){if(!this.value)clearSearch();});
</script>
</body>
