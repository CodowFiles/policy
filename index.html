<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年政策文件汇编</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 主页面 -->
        <main id="home-page" class="page active">
            <header class="header">
                <div class="header-content">
                    <h1 class="header-title">2026年政策文件汇编</h1>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="搜索政策文件..." autocomplete="off">
                        <button id="search-btn" class="search-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>
            
            <div class="container">
                <div class="stats-bar">
                    <span id="total-count">共 31 份文件</span>
                    <span id="search-result-count" class="hidden"></span>
                </div>
                
                <div id="policy-list" class="policy-list">
                    <!-- 政策列表将通过JS动态生成 -->
                </div>
            </div>
        </main>

        <!-- 详情页面 -->
        <main id="detail-page" class="page">
            <header class="header detail-header">
                <div class="header-content">
                    <button id="back-btn" class="back-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m15 18-6-6 6-6"/>
                        </svg>
                        <span>返回</span>
                    </button>
                    <h2 id="detail-title" class="detail-title"></h2>
                    <div class="view-toggle">
                        <button id="text-view-btn" class="toggle-btn active">文字版</button>
                        <button id="scan-view-btn" class="toggle-btn">扫描版</button>
                    </div>
                </div>
            </header>
            
            <div class="container detail-container">
                <div id="content-wrapper" class="content-wrapper">
                    <div id="text-content" class="content-panel active">
                        <!-- 文字内容 -->
                    </div>
                    <div id="scan-content" class="content-panel">
                        <!-- PDF扫描版 -->
                        <iframe id="pdf-frame" src="" frameborder="0"></iframe>
                    </div>
                </div>
            </div>
            
            <!-- 字体大小控制 -->
            <div class="font-size-controls" id="font-size-controls">
                <button class="font-size-btn" data-size="small" title="小字体">A-</button>
                <button class="font-size-btn active" data-size="normal" title="标准字体">A</button>
                <button class="font-size-btn" data-size="large" title="大字体">A+</button>
                <button class="font-size-btn" data-size="xlarge" title="超大字体">A++</button>
            </div>
        </main>

        <!-- 搜索结果页面 -->
        <main id="search-page" class="page">
            <header class="header">
                <div class="header-content">
                    <button id="search-back-btn" class="back-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m15 18-6-6 6-6"/>
                        </svg>
                        <span>返回</span>
                    </button>
                    <h2 class="detail-title">搜索结果</h2>
                    <div class="search-box">
                        <input type="text" id="search-page-input" placeholder="搜索政策文件..." autocomplete="off">
                        <button id="search-page-btn" class="search-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>
            
            <div class="container">
                <div id="search-stats" class="stats-bar"></div>
                <div id="search-results" class="policy-list">
                    <!-- 搜索结果 -->
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="mobile-table.js"></script>
</body>
</html>
