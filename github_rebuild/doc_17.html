<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="format-detection" content="telephone=no">
<title>关于外埠市场开发设备支持方案2.0 - 2026年政策文件汇编</title>
<style>

/* ============================================
   设计系统 - CSS变量
   ============================================ */
:root {
  /* 主色调 - 专业蓝色系 */
  --primary-50: #eff6ff;
  --primary-100: #dbeafe;
  --primary-200: #bfdbfe;
  --primary-300: #93c5fd;
  --primary-400: #60a5fa;
  --primary-500: #3b82f6;
  --primary-600: #2563eb;
  --primary-700: #1d4ed8;
  --primary-800: #1e40af;
  --primary-900: #1e3a8a;
  
  /* 辅助色 */
  --success: #10b981;
  --success-light: #d1fae5;
  --success-dark: #065f46;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --warning-dark: #92400e;
  --error: #ef4444;
  --info: #06b6d4;
  
  /* 中性色 - 文字 */
  --text-primary: #1f2937;
  --text-secondary: #4b5563;
  --text-tertiary: #6b7280;
  --text-muted: #9ca3af;
  --text-inverse: #ffffff;
  
  /* 中性色 - 背景 */
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --bg-hover: #e2e8f0;
  --bg-active: #dbeafe;
  
  /* 中性色 - 边框 */
  --border-light: #e5e7eb;
  --border-medium: #d1d5db;
  --border-dark: #9ca3af;
  
  /* 间距系统 - 8点网格 */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  
  /* 阴影系统 */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
  --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
  --shadow-colored: 0 4px 14px 0 rgba(37, 99, 235, 0.25);
  
  /* 圆角系统 */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;
  
  /* 字体 */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", Consolas, monospace;
  
  /* 过渡 */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
}

/* ============================================
   基础样式重置
   ============================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-primary);
  background: var(--bg-secondary);
}

/* ============================================
   顶部导航栏
   ============================================ */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 64px;
  background: linear-gradient(135deg, var(--primary-800) 0%, var(--primary-600) 100%);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-6);
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  color: white;
}

.navbar-brand-icon {
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  backdrop-filter: blur(4px);
}

.navbar-brand-text {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.navbar-brand-subtitle {
  font-size: 12px;
  opacity: 0.8;
  font-weight: 400;
}

/* 搜索框 */
.search-box {
  position: relative;
  width: 360px;
  max-width: 100%;
}

.search-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: var(--space-4);
  color: rgba(255, 255, 255, 0.7);
  font-size: 18px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  height: 44px;
  padding: 0 var(--space-4) 0 var(--space-12);
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: var(--radius-full);
  color: white;
  font-size: 14px;
  transition: all var(--transition-fast);
}

.search-input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.search-input:hover {
  background: rgba(255, 255, 255, 0.18);
}

.search-input:focus {
  background: rgba(255, 255, 255, 0.25);
  border-color: rgba(255, 255, 255, 0.4);
  outline: none;
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
}

.search-clear {
  position: absolute;
  right: var(--space-3);
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.7);
  font-size: 18px;
  cursor: pointer;
  padding: var(--space-1);
  display: none;
}

.search-clear.visible {
  display: block;
}

/* 菜单按钮（移动端） */
.menu-btn {
  display: none;
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  padding: var(--space-2);
  border-radius: var(--radius-md);
  transition: background var(--transition-fast);
}

.menu-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* ============================================
   搜索结果提示条
   ============================================ */
.search-toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: var(--space-3) var(--space-5);
  box-shadow: var(--shadow-xl);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  z-index: 90;
  opacity: 0;
  transition: all var(--transition-normal);
}

.search-toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.search-toast-text {
  font-size: 14px;
  color: var(--text-secondary);
}

.search-toast-count {
  font-weight: 600;
  color: var(--primary-600);
}

.search-nav {
  display: flex;
  gap: var(--space-2);
}

.search-nav-btn {
  width: 32px;
  height: 32px;
  background: var(--primary-50);
  border: none;
  border-radius: var(--radius-md);
  color: var(--primary-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition-fast);
}

.search-nav-btn:hover:not(:disabled) {
  background: var(--primary-100);
}

.search-nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.search-clear-btn {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-tertiary);
  border: none;
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.search-clear-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ============================================
   布局容器
   ============================================ */
.layout {
  display: flex;
  max-width: 1440px;
  margin: 0 auto;
  min-height: calc(100vh - 64px);
}

/* ============================================
   侧边栏导航
   ============================================ */
.sidebar {
  width: 300px;
  height: calc(100vh - 64px);
  background: var(--bg-primary);
  border-right: 1px solid var(--border-light);
  overflow-y: auto;
  position: sticky;
  top: 64px;
  flex-shrink: 0;
}

.sidebar-header {
  padding: var(--space-6);
  border-bottom: 1px solid var(--border-light);
  background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
}

.sidebar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-stats {
  display: flex;
  gap: var(--space-6);
  margin-top: var(--space-3);
  font-size: 13px;
}

.sidebar-stat {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
}

.sidebar-stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary-600);
  line-height: 1;
}

.sidebar-stat-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* 导航列表 */
.nav-list {
  list-style: none;
  padding: var(--space-2) 0;
}

.nav-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-5);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  line-height: 1.5;
  border-left: 3px solid transparent;
  transition: all var(--transition-fast);
}

.nav-item:hover {
  background: var(--primary-50);
  color: var(--primary-700);
}

.nav-item.active {
  background: var(--primary-50);
  color: var(--primary-700);
  border-left-color: var(--primary-500);
  font-weight: 500;
}

.nav-item-number {
  width: 28px;
  height: 28px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  flex-shrink: 0;
  margin-top: 2px;
}

.nav-item.active .nav-item-number {
  background: var(--primary-500);
  color: white;
}

.nav-item-text {
  flex: 1;
}

/* 侧边栏遮罩（移动端） */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 150;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition-normal);
}

.sidebar-overlay.open {
  opacity: 1;
  visibility: visible;
}

/* ============================================
   主内容区
   ============================================ */
.main-content {
  flex: 1;
  padding: var(--space-6) var(--space-8) var(--space-12);
  max-width: 900px;
}

/* 页面标题区 */
.page-header {
  text-align: center;
  padding: var(--space-6) 0 var(--space-10);
  margin-bottom: var(--space-6);
  border-bottom: 1px solid var(--border-light);
}

.page-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary-800);
  margin-bottom: var(--space-3);
  letter-spacing: -0.5px;
}

.page-subtitle {
  font-size: 15px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
}

.page-subtitle-dot {
  width: 4px;
  height: 4px;
  background: var(--border-medium);
  border-radius: var(--radius-full);
}

/* ============================================
   政策卡片
   ============================================ */
.policy-card {
  background: var(--bg-primary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: all var(--transition-normal);
  margin-bottom: var(--space-6);
  scroll-margin-top: 80px;
}

.policy-card:hover {
  box-shadow: var(--shadow-lg);
  border-color: var(--border-medium);
  transform: translateY(-2px);
}

.policy-card-header {
  padding: var(--space-6);
  background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
  border-bottom: 1px solid var(--border-light);
}

.policy-card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: var(--space-3);
}

.policy-card-meta {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  flex-wrap: wrap;
}

.policy-card-tags {
  display: flex;
  gap: var(--space-2);
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 500;
}

.tag-word {
  background: var(--primary-100);
  color: var(--primary-800);
}

.tag-scan {
  background: var(--warning-light);
  color: var(--warning-dark);
}

.tag-both {
  background: var(--success-light);
  color: var(--success-dark);
}

.tag-icon {
  font-size: 10px;
}

.policy-card-id {
  font-size: 13px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* Tab 切换 */
.policy-tabs {
  display: flex;
  gap: var(--space-1);
  background: var(--bg-tertiary);
  padding: var(--space-2);
  margin: var(--space-4) var(--space-6) 0;
  border-radius: var(--radius-lg);
}

.tab-btn {
  flex: 1;
  padding: var(--space-3) var(--space-4);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.5);
}

.tab-btn.active {
  background: var(--bg-primary);
  color: var(--primary-600);
  box-shadow: var(--shadow-sm);
}

.tab-icon {
  font-size: 16px;
}

.tab-content {
  display: none;
  padding: var(--space-6);
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================
   文档内容样式
   ============================================ */
.document-content {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-primary);
}

.document-content h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary-800);
  text-align: center;
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-4);
  border-bottom: 2px solid var(--primary-200);
}

.document-content h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary-700);
  margin: var(--space-8) 0 var(--space-4);
  padding-left: var(--space-4);
  border-left: 4px solid var(--primary-500);
}

.document-content h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin: var(--space-6) 0 var(--space-3);
}

.document-content h4,
.document-content h5 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: var(--space-4) 0 var(--space-2);
}

.document-content p {
  margin-bottom: var(--space-3);
  text-align: justify;
}

.document-content strong {
  font-weight: 600;
  color: var(--text-primary);
}

/* 表格样式 */
.table-wrap {
  overflow-x: auto;
  margin: var(--space-5) 0;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.doc-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  background: var(--bg-primary);
}

.doc-table th,
.doc-table td {
  padding: var(--space-3) var(--space-4);
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}

.doc-table th {
  background: var(--primary-50);
  font-weight: 600;
  color: var(--primary-800);
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.doc-table tr:hover td {
  background: var(--bg-secondary);
}

.doc-table tr:last-child td {
  border-bottom: none;
}

/* 签批表特殊样式 */
.approval-table {
  font-size: 13px;
  color: var(--text-secondary);
}

.approval-table th,
.approval-table td {
  padding: var(--space-2) var(--space-3);
}

/* 图片样式 */
.doc-img {
  text-align: center;
  margin: var(--space-5) 0;
  padding: var(--space-4);
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
}

.doc-img img {
  max-width: 100%;
  height: auto;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
}

.img-caption {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: var(--space-3);
}

/* 扫描图片 */
.scan-content {
  padding: var(--space-4);
}

.scan-page {
  margin-bottom: var(--space-5);
  text-align: center;
  background: var(--bg-tertiary);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.scan-page img {
  width: 100%;
  height: auto;
  display: block;
}

.page-num {
  font-size: 12px;
  color: var(--text-muted);
  padding: var(--space-2);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-light);
}

/* ============================================
   搜索高亮
   ============================================ */
.highlight {
  background: linear-gradient(180deg, transparent 60%, #fef08a 60%);
  color: var(--text-primary);
  font-weight: 500;
  padding: 0 2px;
  border-radius: 2px;
}

.highlight.current {
  background: #fbbf24;
  box-shadow: 0 0 0 3px #fbbf24;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% {
    box-shadow: 0 0 0 3px #fbbf24;
  }
  50% {
    box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.3);
  }
}

/* ============================================
   返回顶部按钮
   ============================================ */
.back-to-top {
  position: fixed;
  right: var(--space-6);
  bottom: var(--space-6);
  width: 52px;
  height: 52px;
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px) scale(0.9);
  transition: all var(--transition-normal);
  z-index: 80;
}

.back-to-top.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.back-to-top:hover {
  background: var(--primary-50);
  border-color: var(--primary-200);
  transform: translateY(-4px);
  box-shadow: var(--shadow-colored);
}

.back-to-top svg {
  width: 24px;
  height: 24px;
  color: var(--primary-600);
}

/* ============================================
   空状态
   ============================================ */
.empty-state {
  text-align: center;
  padding: var(--space-16) var(--space-6);
  color: var(--text-tertiary);
}

.empty-state-icon {
  font-size: 64px;
  margin-bottom: var(--space-4);
  opacity: 0.5;
}

.empty-state-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.empty-state-desc {
  font-size: 14px;
}

/* ============================================
   响应式设计
   ============================================ */

/* 平板适配 */
@media (max-width: 1023px) {
  .sidebar {
    width: 260px;
  }
  
  .main-content {
    padding: var(--space-5) var(--space-6) var(--space-10);
  }
  
  .search-box {
    width: 280px;
  }
}

/* 移动端适配 */
@media (max-width: 767px) {
  .navbar {
    height: 56px;
    padding: 0 var(--space-4);
  }
  
  .navbar-brand-icon {
    width: 36px;
    height: 36px;
    font-size: 20px;
  }
  
  .navbar-brand-text {
    font-size: 16px;
  }
  
  .navbar-brand-subtitle {
    display: none;
  }
  
  .menu-btn {
    display: block;
  }
  
  .search-box {
    width: auto;
    flex: 1;
    max-width: 200px;
  }
  
  .search-input {
    height: 40px;
    font-size: 14px;
  }
  
  /* 侧边栏变为抽屉 */
  .sidebar {
    position: fixed;
    top: 0;

<body>
<div class="navbar">
  <div class="navbar-brand">
    <a href="index.html" class="navbar-brand-icon">←</a>
    <span class="navbar-brand-text">关于外埠市场开发设备支持方案2.0</span>
  </div>
  <div class="doc-nav-btns">
    <a href="doc_16.html">← 上一篇</a>
    <a href="doc_18.html">下一篇 →</a>
  </div>
</div>
<div class="srbar2" id="srbar2">
  <span class="sr-label" id="srtext2"></span>
  <button onclick="goPrev2()">↑ 上一个</button>
  <button onclick="goNext2()">↓ 下一个</button>
  <button onclick="clearSearch2()">✕ 清除</button>
</div>
<div class="doc-wrap">

</div>
<button class="back-top" id="backTop2" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>



// 行内搜索（从首页跳转携带关键词）—— 支持跨span合并匹配

var _m2=[],_i2=-1;

function hlSearch2(kw){

  if(!kw)return;

  var terms=kw.split(/[\s,，]+/).filter(Boolean);

  var regs=terms.map(function(t){return new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');});

  var wrap=document.querySelector('.doc-wrap');

  var leafSel='p,td,th,li,h1,h2,h3,h4,h5,h6,caption';

  var containers=Array.prototype.slice.call(wrap.querySelectorAll(leafSel));

  containers=containers.filter(function(el){

    return !containers.some(function(other){return other!==el&&el.contains(other);});

  });

  _m2=[];

  containers.forEach(function(container){

    var fullText=container.innerText||container.textContent||'';

    var hit=regs.every(function(re){re.lastIndex=0;return re.test(fullText);});

    if(!hit)return;

    regs.forEach(function(re){

      var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT);

      var nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);

      nodes.forEach(function(node){

        if(node.parentNode&&node.parentNode.classList&&node.parentNode.classList.contains('doc-highlight'))return;

        var v=node.nodeValue;

        re.lastIndex=0;

        if(!re.test(v))return;

        var frag=document.createDocumentFragment(),last=0,matches=[];

        re.lastIndex=0;var m;

        while((m=re.exec(v))!==null)matches.push({s:m.index,e:m.index+m[0].length});

        matches.forEach(function(seg){

          if(seg.s>last)frag.appendChild(document.createTextNode(v.slice(last,seg.s)));

          var sp=document.createElement('span');sp.className='doc-highlight';sp.textContent=v.slice(seg.s,seg.e);

          frag.appendChild(sp);_m2.push(sp);last=seg.e;

        });

        if(last<v.length)frag.appendChild(document.createTextNode(v.slice(last)));

        if(node.parentNode)node.parentNode.replaceChild(frag,node);

      });

    });

  });

  if(_m2.length>0){

    _i2=0;scrollTo2(0);

    document.getElementById('srbar2').classList.add('on');

  } else {

    var bar=document.getElementById('srbar2');

    var lbl=document.getElementById('srtext2');

    if(bar&&lbl){bar.classList.add('on');lbl.textContent='"'+kw+'" 在文字版中未找到，可切换至扫描版查看';}

  }

}



function scrollTo2(i){



  _m2.forEach(function(el){el.classList.remove('current');});



  _m2[i].classList.add('current');



  _m2[i].scrollIntoView({behavior:'smooth',block:'center'});



  // 激活所在Tab



  var tc=_m2[i].closest('.tab-content');



  if(tc&&!tc.classList.contains('active')){



    var sec=tc.closest('.policy-section');



    var btn=sec&&sec.querySelector('[onclick*="'+tc.id+'"]');



    if(btn)switchTab(btn,tc.id);



  }



  document.getElementById('srtext2').textContent='"'+_kw2+'" '+(_i2+1)+'/'+_m2.length;



}



var _kw2='';



function goPrev2(){if(!_m2.length)return;_i2=(_i2-1+_m2.length)%_m2.length;scrollTo2(_i2);}



function goNext2(){if(!_m2.length)return;_i2=(_i2+1)%_m2.length;scrollTo2(_i2);}



function clearSearch2(){



  document.querySelectorAll('.doc-highlight').forEach(function(sp){



    var p=sp.parentNode;if(!p)return;p.replaceChild(document.createTextNode(sp.textContent),sp);p.normalize();



  });



  _m2=[];_i2=-1;document.getElementById('srbar2').classList.remove('on');



}



function _loadTabImgs(container){

  if(!container)return;

  var imgs=container.querySelectorAll('img[data-src]');

  imgs.forEach(function(img){

    if(img.getAttribute('src')!==img.dataset.src){

      img.src=img.dataset.src;

    }

  });

}

function switchTab(btn,cid){

  var sec=btn.closest('.policy-section');

  sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});

  sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});

  btn.classList.add('active');

  var tc=document.getElementById(cid);

  tc.classList.add('active');

  _loadTabImgs(tc);

}



// 从URL读关键词



(function(){



  var p=new URLSearchParams(window.location.search);



  _kw2=p.get('q')||'';



  if(_kw2)setTimeout(function(){hlSearch2(_kw2);},300);



})();



// 懒加载



if('IntersectionObserver' in window){



  var _io=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){var img=x.target;if(img.dataset.src){img.src=img.dataset.src;_io.unobserve(img);}}})},{rootMargin:'300px'});



  document.querySelectorAll('img[loading="lazy"]').forEach(function(img){_io.observe(img);});



}



// 回到顶部



window.addEventListener('scroll',function(){document.getElementById('backTop2').classList.toggle('on',window.scrollY>300);});



// 手机端默认扫描版Tab



(function(){



  if(window.innerWidth>=700)return;



  document.querySelectorAll('.policy-section').forEach(function(sec){



    var scanTab=sec.querySelector('.tab-btn[onclick*="-scan"]');



    if(!scanTab)return;



    sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});



    sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});



    scanTab.classList.add('active');



    var m=scanTab.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);



    if(m){var tc=document.getElementById(m[1]);tc.classList.add('active');_loadTabImgs(tc);}



  });



})();



</script>
</body>
