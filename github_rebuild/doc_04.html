<style>
/* ============================================
   设计系统 - CSS变量
   ============================================ */
:root {
  /* 主色调 - 专业蓝色系 */
  --primary-50: #eff6ff;
  --primary-100: #dbeafe;
  --primary-200: #bfdbfe;
  --primary-300: #93c5fd;
  --primary-400: #60a5fa;
  --primary-500: #3b82f6;
  --primary-600: #2563eb;
  --primary-700: #1d4ed8;
  --primary-800: #1e40af;
  --primary-900: #1e3a8a;
  
  /* 辅助色 */
  --success: #10b981;
  --success-light: #d1fae5;
  --success-dark: #065f46;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --warning-dark: #92400e;
  --error: #ef4444;
  --info: #06b6d4;
  
  /* 中性色 - 文字 */
  --text-primary: #1f2937;
  --text-secondary: #4b5563;
  --text-tertiary: #6b7280;
  --text-muted: #9ca3af;
  --text-inverse: #ffffff;
  
  /* 中性色 - 背景 */
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --bg-hover: #e2e8f0;
  --bg-active: #dbeafe;
  
  /* 中性色 - 边框 */
  --border-light: #e5e7eb;
  --border-medium: #d1d5db;
  --border-dark: #9ca3af;
  
  /* 间距系统 - 8点网格 */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  
  /* 阴影系统 */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
  --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
  --shadow-colored: 0 4px 14px 0 rgba(37, 99, 235, 0.25);
  
  /* 圆角系统 */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;
  
  /* 字体 */
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", Consolas, monospace;
  
  /* 过渡 */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
}

/* ============================================
   基础样式重置
   ============================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;

body {

/* ============================================
   表格样式
   ============================================ */

<div class="srbar2" id="srbar2">
<span class="sr-label" id="srtext2"></span>
<button onclick="goPrev2()">↑ 上一个</button>

<button onclick="clearSearch2()">✕ 清除</button>

<script>



// 行内搜索（从首页跳转携带关键词）—— 支持跨span合并匹配

var _m2=[],_i2=-1;

function hlSearch2(kw){

  if(!kw)return;

  var terms=kw.split(/[\s,，]+/).filter(Boolean);

  var regs=terms.map(function(t){return new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');});

  var wrap=document.querySelector('.doc-wrap');

  var leafSel='p,td,th,li,h1,h2,h3,h4,h5,h6,caption';

  var containers=Array.prototype.slice.call(wrap.querySelectorAll(leafSel));

  containers=containers.filter(function(el){

    return !containers.some(function(other){return other!==el&&el.contains(other);});

  });

  _m2=[];

  containers.forEach(function(container){

    var fullText=container.innerText||container.textContent||'';

    var hit=regs.every(function(re){re.lastIndex=0;return re.test(fullText);});

    if(!hit)return;

    regs.forEach(function(re){

      var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT);

      var nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);

      nodes.forEach(function(node){

        if(node.parentNode&&node.parentNode.classList&&node.parentNode.classList.contains('doc-highlight'))return;

        var v=node.nodeValue;

        re.lastIndex=0;

        if(!re.test(v))return;

        var frag=document.createDocumentFragment(),last=0,matches=[];

        re.lastIndex=0;var m;

        while((m=re.exec(v))!==null)matches.push({s:m.index,e:m.index+m[0].length});

        matches.forEach(function(seg){

          if(seg.s>last)frag.appendChild(document.createTextNode(v.slice(last,seg.s)));

          var sp=document.createElement('span');sp.className='doc-highlight';sp.textContent=v.slice(seg.s,seg.e);

          frag.appendChild(sp);_m2.push(sp);last=seg.e;

        });

        if(last<v.length)frag.appendChild(document.createTextNode(v.slice(last)));

        if(node.parentNode)node.parentNode.replaceChild(frag,node);

      });

    });

  });

  if(_m2.length>0){

    _i2=0;scrollTo2(0);

    document.getElementById('srbar2').classList.add('on');

  } else {

    var bar=document.getElementById('srbar2');

    var lbl=document.getElementById('srtext2');

    if(bar&&lbl){bar.classList.add('on');lbl.textContent='"'+kw+'" 在文字版中未找到，可切换至扫描版查看';}

  }

}



function scrollTo2(i){



  _m2.forEach(function(el){el.classList.remove('current');});



  _m2[i].classList.add('current');



  _m2[i].scrollIntoView({behavior:'smooth',block:'center'});



  // 激活所在Tab



  var tc=_m2[i].closest('.tab-content');



  if(tc&&!tc.classList.contains('active')){



    var sec=tc.closest('.policy-section');



    var btn=sec&&sec.querySelector('[onclick*="'+tc.id+'"]');



    if(btn)switchTab(btn,tc.id);



  }



  document.getElementById('srtext2').textContent='"'+_kw2+'" '+(_i2+1)+'/'+_m2.length;



}



var _kw2='';



function goPrev2(){if(!_m2.length)return;_i2=(_i2-1+_m2.length)%_m2.length;scrollTo2(_i2);}



function goNext2(){if(!_m2.length)return;_i2=(_i2+1)%_m2.length;scrollTo2(_i2);}



function clearSearch2(){



  document.querySelectorAll('.doc-highlight').forEach(function(sp){



    var p=sp.parentNode;if(!p)return;p.replaceChild(document.createTextNode(sp.textContent),sp);p.normalize();



  });



  _m2=[];_i2=-1;document.getElementById('srbar2').classList.remove('on');



}



function _loadTabImgs(container){

  if(!container)return;

  var imgs=container.querySelectorAll('img[data-src]');

  imgs.forEach(function(img){

    if(img.getAttribute('src')!==img.dataset.src){

      img.src=img.dataset.src;

    }

  });

}

function switchTab(btn,cid){

  var sec=btn.closest('.policy-section');

  sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});

  sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});

  btn.classList.add('active');

  var tc=document.getElementById(cid);

  tc.classList.add('active');

  _loadTabImgs(tc);

}



// 从URL读关键词



(function(){



  var p=new URLSearchParams(window.location.search);



  _kw2=p.get('q')||'';



  if(_kw2)setTimeout(function(){hlSearch2(_kw2);},300);



})();



// 懒加载



if('IntersectionObserver' in window){



  var _io=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){var img=x.target;if(img.dataset.src){img.src=img.dataset.src;_io.unobserve(img);}}})},{rootMargin:'300px'});



  document.querySelectorAll('img[loading="lazy"]').forEach(function(img){_io.observe(img);});



}



// 回到顶部



window.addEventListener('scroll',function(){document.getElementById('backTop2').classList.toggle('on',window.scrollY>300);});



// 手机端默认扫描版Tab



(function(){



  if(window.innerWidth>=700)return;



  document.querySelectorAll('.policy-section').forEach(function(sec){



    var scanTab=sec.querySelector('.tab-btn[onclick*="-scan"]');



    if(!scanTab)return;



    sec.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});



    sec.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});



    scanTab.classList.add('active');



    var m=scanTab.getAttribute('onclick').match(/switchTab\(this,'([^']+)'\)/);



    if(m){var tc=document.getElementById(m[1]);tc.classList.add('active');_loadTabImgs(tc);}



  });



})();



</script>
