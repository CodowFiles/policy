<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>2026年政策文件汇编</title>
<style>
/* ============================================
   设计系统 - CSS变量
   ============================================ */
:root {
  --primary-50: #eff6ff;
  --primary-100: #dbeafe;
  --primary-200: #bfdbfe;
  --primary-500: #3b82f6;
  --primary-600: #2563eb;
  --primary-700: #1d4ed8;
  --primary-800: #1e40af;
  --primary-900: #1e3a8a;
  
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  
  --text-primary: #1f2937;
  --text-secondary: #4b5563;
  --text-tertiary: #6b7280;
  --text-muted: #9ca3af;
  
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  
  --border-light: #e5e7eb;
  --border-medium: #d1d5db;
  
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
  font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
  font-size: 14px; 
  color: var(--text-primary); 
  background: var(--bg-secondary); 
  line-height: 1.6;
}

/* ============================================
   顶部导航栏
   ============================================ */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 56px;
  background: linear-gradient(135deg, var(--primary-800) 0%, var(--primary-600) 100%);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-4);
}

.top-brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  color: white;
}

.top-brand-icon {
  width: 36px;
  height: 36px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.top-title {
  font-size: 16px;
  font-weight: 600;
}

/* 搜索框 */
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: var(--radius-full);
  padding: var(--space-1) var(--space-3);
  transition: all 0.2s;
}

.search-wrap:focus-within {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.4);
}

#searchInput {
  background: none;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
  width: 140px;
  padding: 0 var(--space-2);
}

#searchInput::placeholder { color: rgba(255, 255, 255, 0.6); }

.search-clear {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.7);
  font-size: 16px;
  cursor: pointer;
  padding: 0 var(--space-1);
  display: none;
}

.search-clear.on { display: inline; }

.search-btn {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 16px;
  padding: 0 var(--space-1);
}

/* ============================================
   Hero区域
   ============================================ */
.hero {
  background: linear-gradient(135deg, var(--primary-700) 0%, var(--primary-500) 100%);
  color: white;
  padding: var(--space-8) var(--space-4);
  text-align: center;
}

.hero h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: var(--space-2);
}

.hero p {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: var(--space-5);
}

.stat-row {
  display: flex;
  justify-content: center;
  gap: var(--space-8);
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  opacity: 0.8;
  margin-top: var(--space-1);
}

/* ============================================
   内容区域
   ============================================ */
.content {
  padding: var(--space-5) var(--space-4) var(--space-10);
  max-width: 860px;
  margin: 0 auto;
}

.section-label {
  font-size: 12px;
  color: var(--text-muted);
  padding: var(--space-3) var(--space-2);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ============================================
   文档卡片
   ============================================ */
.doc-card {
  display: flex;
  align-items: center;
  background: var(--bg-primary);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-3);
  padding: var(--space-4);
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.2s;
  gap: var(--space-3);
}

.doc-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-medium);
  transform: translateY(-2px);
}

.doc-card:active {
  transform: scale(0.99);
}

.doc-card.hidden { display: none !important; }

.doc-num {
  background: var(--primary-500);
  color: white;
  font-size: 12px;
  font-weight: 700;
  border-radius: var(--radius-md);
  padding: var(--space-1) var(--space-2);
  flex-shrink: 0;
  min-width: 32px;
  text-align: center;
}

.doc-card-body {
  flex: 1;
  min-width: 0;
}

.doc-card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text-primary);
  display: block;
}

.doc-card-snippet {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.5;
  margin-top: var(--space-1);
  display: none;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.doc-card-snippet.on { display: -webkit-box; }
.doc-card-snippet mark {
  background: #fef08a;
  color: var(--text-primary);
  font-style: normal;
  border-radius: 2px;
  padding: 0 2px;
}

.doc-arrow {
  color: var(--text-muted);
  font-size: 20px;
  flex-shrink: 0;
}

.doc-card.has-kw .doc-arrow::after {
  content: "进入";
  font-size: 10px;
  color: var(--primary-600);
  font-weight: 600;
  display: block;
  line-height: 1;
}

/* ============================================
   搜索结果
   ============================================ */
.result-stat {
  font-size: 13px;
  color: var(--primary-600);
  padding: var(--space-2);
  display: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.result-stat .clear-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
}

.search-hint {
  display: none;
  background: var(--primary-50);
  border-left: 3px solid var(--primary-500);
  padding: var(--space-3) var(--space-4);
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: var(--space-3);
  border-radius: var(--radius-md);
}

.search-hint.on { display: block; }

.no-result {
  text-align: center;
  padding: var(--space-10) var(--space-4);
  color: var(--text-muted);
  font-size: 14px;
  display: none;
}

/* ============================================
   搜索历史
   ============================================ */
.search-hist {
  background: var(--bg-primary);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  box-shadow: var(--shadow-lg);
  position: absolute;
  top: 56px;
  left: var(--space-4);
  right: var(--space-4);
  z-index: 200;
  display: none;
  padding: var(--space-2) 0;
  max-height: 240px;
  overflow-y: auto;
}

.search-hist.on { display: block; }

.hist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-2) var(--space-4) var(--space-3);
  border-bottom: 1px solid var(--border-light);
}

.hist-header span { font-size: 12px; color: var(--text-muted); }
.hist-header button {
  font-size: 12px;
  color: var(--primary-600);
  background: none;
  border: none;
  cursor: pointer;
}

.hist-item {
  display: flex;
  align-items: center;
  padding: var(--space-3) var(--space-4);
  cursor: pointer;
  gap: var(--space-2);
  font-size: 14px;
  color: var(--text-primary);
}

.hist-item:active { background: var(--bg-secondary); }
.hist-item .hist-icon { color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
.hist-item .hist-del {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 16px;
  padding: 0 var(--space-1);
  background: none;
  border: none;
  cursor: pointer;
}

/* ============================================
   响应式
   ============================================ */
@media (max-width: 480px) {
  .hero h2 { font-size: 20px; }
  .stat-num { font-size: 28px; }
  .stat-row { gap: var(--space-6); }
  #searchInput { width: 100px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<header class="top-bar">
  <div class="top-brand">
    <div class="top-brand-icon">&#128196;</div>
    <span class="top-title">政策文件汇编</span>
  </div>
  
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="搜索政策..." autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">&#10005;</button>
    <button class="search-btn" onclick="doSearch()">&#128269;</button>
  </div>
</header>

<!-- 搜索历史 -->
<div class="search-hist" id="searchHist">
  <div class="hist-header">
    <span>搜索历史</span>
    <button onclick="clearAllHist()">全部清除</button>
  </div>
  <div id="histList"></div>
</div>

<!-- Hero区域 -->
<section class="hero">
  <h2>2026年政策文件汇编</h2>
  <p>市场开发部 · 内部政策文件</p>
  <div class="stat-row">
    <div class="stat-item">
      <div class="stat-num">31</div>
      <div class="stat-label">份文件</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">2026</div>
      <div class="stat-label">年度版</div>
    </div>
  </div>
</section>

<!-- 内容区域 -->
<main class="content">
  <div class="section-label">全部文件（点击查看详情）</div>
  <div id="resultStat" class="result-stat"></div>
  <div id="searchHint" class="search-hint">&#128269; 点击文件进入后，关键词将自动高亮显示</div>
  
  <!-- 文档卡片列表 -->
  <div id="docList">
    <!-- 文档卡片将通过JS动态生成或从原文件复制 -->
  </div>
  
  <div id="noResult" class="no-result">
    <div style="font-size: 48px; margin-bottom: var(--space-3);">&#128269;</div>
    未找到相关文件<br>
    <small>请尝试其他关键词</small>
  </div>
</main>

<script>
// ============================================
// 文档数据
// ============================================
const docData = [
  { id: 30, num: "01", title: "2026年翻牌店政策与提成方案", file: "doc_30.html" },
  { id: 31, num: "02", title: "2026年限时新开店政策及提成", file: "doc_31.html" },
  { id: 1, num: "03", title: "新可多标准店紧密型加盟模式3.0版", file: "doc_01.html" },
  { id: 2, num: "04", title: "新可多鲜食店紧密型加盟模式3.0版", file: "doc_02.html" },
  { id: 3, num: "05", title: "可多新开带铺加盟方案3.0", file: "doc_03.html" },
  { id: 4, num: "06", title: "可多新开店加盟优惠政策3.0", file: "doc_04.html" },
  { id: 5, num: "07", title: "可多员工加盟开店指导方案2.0", file: "doc_05.html" },
  { id: 6, num: "08", title: "可多加盟意向定金缴纳标准2.0", file: "doc_06.html" },
  { id: 7, num: "09", title: "门店迁址方案3.0", file: "doc_07.html" },
  { id: 8, num: "10", title: "新开门店首年异动处理方案2.0", file: "doc_08.html" },
  { id: 9, num: "11", title: "市场开发部开店提成方案2.0", file: "doc_09.html" },
  { id: 10, num: "12", title: "市场开发部历史开店提成方案2.0", file: "doc_10.html" },
  { id: 11, num: "13", title: "可多全民开发奖励方案4.0", file: "doc_11.html" },
  { id: 12, num: "14", title: "大客户服务方案1.0", file: "doc_12.html" },
  { id: 13, num: "15", title: "开发人员晋升降级内控标准优化3.0", file: "doc_13.html" },
  { id: 14, num: "16", title: "市场开发部开发员绩效标准及评比规则1.0", file: "doc_14.html" },
  { id: 15, num: "17", title: "市场开发部开店阶段达成激励方案2.0", file: "doc_15.html" },
  { id: 16, num: "18", title: "市场开发部新人培养期激励方案2.0", file: "doc_16.html" },
  { id: 17, num: "19", title: "关于外埠市场开发设备支持方案2.0", file: "doc_17.html" },
  { id: 18, num: "20", title: "市场开发部光谷东片区阶段性激励方案1.0", file: "doc_18.html" },
  { id: 19, num: "21", title: "市场开发部原东部战区方案1.0", file: "doc_19.html" },
  { id: 20, num: "22", title: "场地评估流程标准4.0", file: "doc_20.html" },
  { id: 21, num: "23", title: "招投标方案2.0", file: "doc_21.html" },
  { id: 22, num: "24", title: "市场开发部招标项目办理流程2.0", file: "doc_22.html" },
  { id: 23, num: "25", title: "可多优质加盟商访谈方案1.0", file: "doc_23.html" },
  { id: 24, num: "26", title: "市场开发部本埠外埠区域划分规定2.0", file: "doc_24.html" },
  { id: 25, num: "27", title: "市场开发部黄区培训及会议机制3.0", file: "doc_25.html" },
  { id: 26, num: "28", title: "市场开发部各岗位参会管理细则1.0", file: "doc_26.html" },
  { id: 27, num: "29", title: "市场开发部会议管理机制2.0", file: "doc_27.html" },
  { id: 28, num: "30", title: "市场开发部开发评级方案1.0", file: "doc_28.html" },
  { id: 29, num: "31", title: "可多市场开发部招聘标准及要求2.0", file: "doc_29.html" }
];

// ============================================
// 初始化
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  renderDocList();
  initSearch();
  loadSearchHist();
});

// ============================================
// 渲染文档列表
// ============================================
function renderDocList() {
  const container = document.getElementById('docList');
  container.innerHTML = docData.map(doc => `
    <a class="doc-card" href="${doc.file}" data-title="${doc.title}">
      <span class="doc-num">${doc.num}</span>
      <div class="doc-card-body">
        <span class="doc-card-title">${doc.title}</span>
        <span class="doc-card-snippet" id="snip_${doc.id}"></span>
      </div>
      <span class="doc-arrow">&#8250;</span>
    </a>
  `).join('');
}

// ============================================
// 搜索功能
// ============================================
function initSearch() {
  const input = document.getElementById('searchInput');
  
  input.addEventListener('focus', function() {
    if (this.value === '' && getSearchHist().length > 0) {
      showSearchHist();
    }
  });
  
  input.addEventListener('input', function() {
    document.getElementById('searchClear').classList.toggle('on', this.value.length > 0);
    if (this.value === '') {
      hideSearchHist();
    }
  });
  
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      doSearch();
      hideSearchHist();
    }
  });
  
  // 点击外部关闭搜索历史
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap') && !e.target.closest('.search-hist')) {
      hideSearchHist();
    }
  });
}

function doSearch() {
  const term = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!term) return;
  
  // 保存搜索历史
  addSearchHist(term);
  
  let matchCount = 0;
  const cards = document.querySelectorAll('.doc-card');
  
  cards.forEach(card => {
    const title = card.dataset.title.toLowerCase();
    const snippetEl = card.querySelector('.doc-card-snippet');
    
    if (title.includes(term)) {
      card.classList.remove('hidden');
      card.classList.add('has-kw');
      
      // 显示匹配片段
      const regex = new RegExp(`(.{0,20}${term}.{0,30})`, 'i');
      const match = title.match(regex);
      if (match && snippetEl) {
        snippetEl.innerHTML = match[0].replace(new RegExp(term, 'gi'), '<mark>$&</mark>');
        snippetEl.classList.add('on');
      }
      
      matchCount++;
    } else {
      card.classList.add('hidden');
      card.classList.remove('has-kw');
      if (snippetEl) {
        snippetEl.classList.remove('on');
        snippetEl.innerHTML = '';
      }
    }
  });
  
  // 显示结果统计
  const resultStat = document.getElementById('resultStat');
  if (matchCount > 0) {
    resultStat.innerHTML = `找到 ${matchCount} 个结果 <button class="clear-btn" onclick="clearSearch()">清除</button>`;
    resultStat.style.display = 'flex';
    document.getElementById('searchHint').classList.add('on');
    document.getElementById('noResult').style.display = 'none';
  } else {
    resultStat.style.display = 'none';
    document.getElementById('searchHint').classList.remove('on');
    document.getElementById('noResult').style.display = 'block';
  }
  
  document.querySelector('.section-label').textContent = matchCount > 0 ? '搜索结果' : '全部文件';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('on');
  document.getElementById('resultStat').style.display = 'none';
  document.getElementById('searchHint').classList.remove('on');
  document.getElementById('noResult').style.display = 'none';
  document.querySelector('.section-label').textContent = '全部文件（点击查看详情）';
  
  document.querySelectorAll('.doc-card').forEach(card => {
    card.classList.remove('hidden', 'has-kw');
    const snippet = card.querySelector('.doc-card-snippet');
    if (snippet) {
      snippet.classList.remove('on');
      snippet.innerHTML = '';
    }
  });
}

// ============================================
// 搜索历史
// ============================================
function getSearchHist() {
  try {
    return JSON.parse(localStorage.getItem('policySearchHist') || '[]');
  } catch {
    return [];
  }
}

function saveSearchHist(hist) {
  localStorage.setItem('policySearchHist', JSON.stringify(hist.slice(0, 10)));
}

function addSearchHist(term) {
  let hist = getSearchHist();
  hist = hist.filter(h => h !== term);
  hist.unshift(term);
  saveSearchHist(hist);
}

function loadSearchHist() {
  renderSearchHist();
}

function renderSearchHist() {
  const hist = getSearchHist();
  const container = document.getElementById('histList');
  
  if (hist.length === 0) {
    container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999; font-size: 13px;">暂无搜索历史</div>';
    return;
  }
  
  container.innerHTML = hist.map((item, index) => `
    <div class="hist-item" onclick="useHist('${item.replace(/'/g, "\\'")}')">
      <span class="hist-icon">&#128269;</span>
      <span>${escapeHtml(item)}</span>
      <button class="hist-del" onclick="event.stopPropagation(); delHist(${index})">&#10005;</button>
    </div>
  `).join('');
}

function showSearchHist() {
  renderSearchHist();
  document.getElementById('searchHist').classList.add('on');
}

function hideSearchHist() {
  document.getElementById('searchHist').classList.remove('on');
}

function useHist(term) {
  document.getElementById('searchInput').value = term;
  document.getElementById('searchClear').classList.add('on');
  hideSearchHist();
  doSearch();
}

function delHist(index) {
  let hist = getSearchHist();
  hist.splice(index, 1);
  saveSearchHist(hist);
  renderSearchHist();
}

function clearAllHist() {
  saveSearchHist([]);
  renderSearchHist();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

</body>
</html>
